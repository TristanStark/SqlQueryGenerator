name: Agent compound query patch

on:
  push:
    branches:
      - agent/compound-query-reverse
    paths:
      - tools/apply_compound_core_patch.py
      - tools/apply_compound_app_tests_patch.py
      - tools/repair_compound_app_patch.py
      - .github/workflows/agent-compound-query-patch.yml
  pull_request:
    branches:
      - master
    paths:
      - tools/apply_compound_core_patch.py
      - tools/apply_compound_app_tests_patch.py
      - tools/repair_compound_app_patch.py
      - .github/workflows/agent-compound-query-patch.yml

permissions:
  contents: write

jobs:
  apply-and-test:
    runs-on: windows-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v7
        with:
          ref: agent/compound-query-reverse
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Apply compound query patches
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          python tools/apply_compound_core_patch.py 2>&1 | Tee-Object -FilePath tools/compound_patch_failure.log
          $coreExit = $LASTEXITCODE
          if ($coreExit -eq 0) {
            python tools/repair_compound_app_patch.py 2>&1 | Tee-Object -FilePath tools/compound_patch_failure.log -Append
            $repairExit = $LASTEXITCODE
          } else {
            $repairExit = 0
          }
          if ($coreExit -eq 0 -and $repairExit -eq 0) {
            python tools/apply_compound_app_tests_patch.py 2>&1 | Tee-Object -FilePath tools/compound_patch_failure.log -Append
            $appExit = $LASTEXITCODE
          } else {
            $appExit = 0
          }
          if ($coreExit -ne 0 -or $repairExit -ne 0 -or $appExit -ne 0) {
            git config user.name "openai-agent"
            git config user.email "openai-agent@users.noreply.github.com"
            git add tools/compound_patch_failure.log
            git commit -m "Record compound patch failure" 2>$null
            if ($LASTEXITCODE -eq 0) {
              git push origin HEAD:agent/compound-query-reverse
            }
            exit 1
          }
          Remove-Item tools/compound_patch_failure.log -ErrorAction SilentlyContinue

      - name: Run test suite
        shell: pwsh
        run: dotnet test tests/SqlQueryGenerator.Tests/SqlQueryGenerator.Tests.csproj --configuration Release

      - name: Commit tested implementation
        shell: pwsh
        run: |
          git config user.name "openai-agent"
          git config user.email "openai-agent@users.noreply.github.com"
          git add -A
          if (git diff --cached --quiet) {
            Write-Host "No generated changes to commit."
            exit 0
          }
          git commit -m "Support compound SELECT reverse engineering"
          git push origin HEAD:agent/compound-query-reverse
