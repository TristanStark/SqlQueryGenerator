changelog:
  exclude:
    labels:
      - "status: duplicate"
      - "status: invalid"
      - "status: wontfix"
      - "skip-changelog"
    authors:
      - "dependabot"
      - "dependabot[bot]"

  categories:
    - title: "Breaking changes"
      labels:
        - "breaking-change"

    - title: "Added"
      labels:
        - "type: feature"

    - title: "Fixed"
      labels:
        - "type: bug"

    - title: "Performance"
      labels:
        - "type: perf"
        - "area: performance"

    - title: "Parser / SQL generation"
      labels:
        - "area: parser"
        - "area: sql-generation"
        - "area: reverse-sql"

    - title: "UI / UX"
      labels:
        - "area: ui"
        - "area: ergonomics"

    - title: "Documentation"
      labels:
        - "type: docs"
        - "area: docs"
        - "area: documentation"

    - title: "CI/CD and packaging"
      labels:
        - "type: ci"
        - "type: release"
        - "area: packaging"

    - title: "Tests"
      labels:
        - "type: test"

    - title: "Other changes"
      labels:
        - "*"
